<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; background: #0B0E1A; font-family: Inter, sans-serif; -webkit-font-smoothing: antialiased; }
  a { color: #8B1A1A; text-decoration: none; }
  a:hover { color: #C0392B; }
  ::selection { background: rgba(139,26,26,.85); color: #F2EDE4; }
  @keyframes scrollPulse { 0% { transform: scaleY(0); transform-origin: top; opacity: 0; } 35% { transform: scaleY(1); transform-origin: top; opacity: 1; } 70% { transform: scaleY(1); transform-origin: bottom; opacity: 1; } 100% { transform: scaleY(0); transform-origin: bottom; opacity: 0; } }
</style>
</helmet>
<div ref="{{ rootRef }}" style="min-height:100vh; color:#F2EDE4;">
  <canvas ref="{{ starsRef }}" style="position:fixed; inset:0; z-index:0; pointer-events:none;"></canvas>
  <div style="position:relative; z-index:1;">

    <section data-screen-label="01 Hero" style="min-height:100svh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; position:relative; padding:clamp(96px,14vh,160px) clamp(24px,6vw,64px);">
      <div style="max-width:820px; display:flex; flex-direction:column; align-items:center; gap:clamp(20px,3.5vh,32px);">
        <p style="margin:0; font-size:11px; letter-spacing:.32em; text-transform:uppercase; font-weight:500; color:rgba(242,237,228,.55);">Ariana Del Rosario &nbsp;·&nbsp; CosmicAry</p>
        <h1 style="margin:0; font-family:Fraunces,serif; font-weight:350; font-size:clamp(42px,10.5vw,92px); line-height:1.04; letter-spacing:-0.015em; text-wrap:balance;">Everything you want is in the unknown.</h1>
        <p style="margin:0; max-width:44ch; font-size:clamp(15px,4vw,18px); line-height:1.6; color:rgba(242,237,228,.72);">Transformational mentor. Rewire your identity. Create your reality — mind, energy, body.</p>
        <div style="display:flex; flex-wrap:wrap; gap:20px; align-items:center; justify-content:center; margin-top:8px;">
          <a href="#academy" onClick="{{ goAcademy }}" style="display:inline-block; background:#9E2422; color:#F2EDE4; padding:16px 30px; border-radius:2px; font-size:14px; font-weight:500; letter-spacing:.04em;" style-hover="background:#C0392B; color:#F2EDE4;" style-active="transform:translateY(1px);">Join the Academy</a>
          <a href="#free" onClick="{{ goFree }}" style="color:rgba(242,237,228,.85); font-size:14px; letter-spacing:.03em; border-bottom:1px solid rgba(242,237,228,.4); padding-bottom:3px;" style-hover="color:#F2EDE4; border-bottom:1px solid rgba(242,237,228,.9);">Free yoga on YouTube</a>
        </div>
      </div>
      <sc-if value="{{ showScrollHint }}" hint-placeholder-val="{{ true }}">
        <div ref="{{ hintRef }}" style="position:absolute; bottom:26px; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:10px;">
          <span style="font-size:10px; letter-spacing:.34em; text-transform:uppercase; color:rgba(242,237,228,.45);">Scroll</span>
          <span style="display:block; width:1px; height:44px; background:linear-gradient(rgba(242,237,228,.7), rgba(242,237,228,0)); animation:scrollPulse 2.8s ease-in-out infinite;"></span>
        </div>
      </sc-if>
    </section>

    <section data-screen-label="Hero image" style="padding:0 clamp(24px,6vw,64px) clamp(72px,12vh,128px);">
      <div data-reveal="" style="max-width:460px; margin:0 auto; aspect-ratio:3/4; position:relative; border:1px solid rgba(242,237,228,.35); border-radius:230px 230px 16px 16px; padding:12px; background:rgba(242,237,228,.05);">
        <div style="position:absolute; inset:12px; border-radius:218px 218px 8px 8px; overflow:hidden;">
          <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="ary-portrait" shape="rect" fit="cover" placeholder="Ariana's photo — ocean light" hint-size="100%,100%"></x-import>
        </div>
        <p style="position:absolute; bottom:-34px; left:0; right:0; margin:0; text-align:center; font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:rgba(242,237,228,.4); pointer-events:none;">Her light, her ocean</p>
      </div>
    </section>

    <!-- (Academy / Stories / Free / Footer sections follow — see repo root index.html for the ported markup.) -->

  </div>
</div>
</x-dc>
<!--
  The <script type="text/x-dc"> Component class (DCLogic) drives:
    - drawStars(): seeded mulberry32 starfield on the fixed canvas
    - onScroll():  smoothstep bg mix cosmos(#0B0E1A) -> cream(#F2EDE4) near the
                   Academy section, canvas opacity/parallax, scroll-hint fade
    - goAcademy/goFree: smooth scrollTo
  All of this is ported to vanilla JS in /main.js at the repo root.
  Editor props: starDensity (0..300, default 120), fadeSpan (0.3..1.5, default 0.66),
  showScrollHint (bool, default true).
-->
</body>
</html>
